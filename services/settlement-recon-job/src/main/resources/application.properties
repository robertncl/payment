spring.application.name=settlement-recon-job
server.port=8084

# SOFARegistry (session endpoint); overridden by env PAYLAB_REGISTRY_ENDPOINT in docker/k8s
com.alipay.sofa.rpc.registry.address=sofa://${PAYLAB_REGISTRY_ENDPOINT:127.0.0.1:9603}
com.alipay.sofa.rpc.bolt.port=12204

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
