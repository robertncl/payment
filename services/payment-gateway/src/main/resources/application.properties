spring.application.name=payment-gateway
server.port=8080

# SOFABoot 4.x config namespace is sofa.boot.rpc.* (3.x com.alipay.sofa.rpc.* keys are silently ignored).
# SOFARegistry session endpoint; overridden by env PAYLAB_REGISTRY_ENDPOINT in docker/k8s.
sofa.boot.rpc.enable-auto-publish=true
sofa.boot.rpc.registry-address=sofa://${PAYLAB_REGISTRY_ENDPOINT:127.0.0.1:9603}
sofa.boot.rpc.bolt-port=12200

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
