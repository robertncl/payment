spring.application.name=payment-gateway
server.port=8080

# SOFABoot 4.x config namespace is sofa.boot.rpc.* (3.x com.alipay.sofa.rpc.* keys are silently ignored).
# SOFARegistry session endpoint; overridden by env PAYLAB_REGISTRY_ENDPOINT in docker/k8s.
sofa.boot.rpc.enable-auto-publish=true
sofa.boot.rpc.registry-address=sofa://${PAYLAB_REGISTRY_ENDPOINT:127.0.0.1:9603}
sofa.boot.rpc.bolt-port=12200

# OceanBase (MySQL mode). All timestamps UTC.
spring.datasource.url=${PAYLAB_DB_URL:jdbc:mysql://127.0.0.1:2881/paylab_gateway?useSSL=false&connectionTimeZone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${PAYLAB_DB_USER:root@paylab}
spring.datasource.password=${PAYLAB_DB_PASSWORD:paylab-dev}
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# outbox relay poll interval (ms)
paylab.outbox.poll-ms=1000

# Seata AT (Phase 2, ADR-0004). Default OFF so bare `mvn spring-boot:run` and unit tests
# don't need a TC; compose/k8s set PAYLAB_SEATA_ENABLED=true. When disabled, capture/refund
# fall back to the ADR-0002 idempotent-callee-first ordering (annotation is a no-op).
seata.enabled=${PAYLAB_SEATA_ENABLED:false}
seata.application-id=${spring.application.name}
seata.tx-service-group=paylab-tx-group
seata.service.vgroup-mapping.paylab-tx-group=default
seata.service.grouplist.default=${PAYLAB_SEATA_ENDPOINT:127.0.0.1:8091}
seata.registry.type=file
seata.config.type=file
seata.data-source-proxy-mode=AT

# Chaos hooks (forced-rollback gate). Only honored when explicitly enabled (lab/e2e).
paylab.chaos.enabled=${PAYLAB_CHAOS_ENABLED:false}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
