spring.application.name=risk-service
server.port=8081

# SOFABoot 4.x config namespace is sofa.boot.rpc.* (3.x com.alipay.sofa.rpc.* keys are silently ignored).
# SOFARegistry session endpoint; overridden by env PAYLAB_REGISTRY_ENDPOINT in docker/k8s.
sofa.boot.rpc.enable-auto-publish=true
sofa.boot.rpc.registry-address=sofa://${PAYLAB_REGISTRY_ENDPOINT:127.0.0.1:9603}
sofa.boot.rpc.bolt-port=12201

# OceanBase (MySQL mode). All timestamps UTC.
spring.datasource.url=${PAYLAB_DB_URL:jdbc:mysql://127.0.0.1:2881/paylab_risk?useSSL=false&connectionTimeZone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${PAYLAB_DB_USER:root@paylab}
spring.datasource.password=${PAYLAB_DB_PASSWORD:paylab-dev}
spring.flyway.enabled=true

# Velocity rule: decline when a payer already has this many approvals inside the window.
paylab.risk.velocity.max-approved=10
paylab.risk.velocity.window-seconds=60

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
