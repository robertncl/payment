# Shadows src/main/resources/application.properties in test scope, so it must be self-contained.
# No SOFARegistry (file-based local registry) and no OceanBase (H2 in MySQL mode + real Flyway schema).
spring.application.name=risk-service
sofa.boot.rpc.enable-auto-publish=true
sofa.boot.rpc.registry-address=local:///tmp/paylab-test-local-registry
sofa.boot.rpc.bolt-port=13201
server.port=0

spring.datasource.url=jdbc:h2:mem:risktest;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.flyway.enabled=true

paylab.risk.velocity.max-approved=10
paylab.risk.velocity.window-seconds=60
