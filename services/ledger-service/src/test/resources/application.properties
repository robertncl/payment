# Self-contained (shadows main). H2 in MySQL mode runs the real Flyway migration for slice tests.
spring.application.name=ledger-service
sofa.boot.rpc.enable-auto-publish=true
sofa.boot.rpc.registry-address=local:///tmp/paylab-test-local-registry
sofa.boot.rpc.bolt-port=13203
server.port=0
spring.datasource.url=jdbc:h2:mem:ledgertest;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
# Seata's autoconfiguration is matchIfMissing=true — must be explicitly off (no TC in tests).
seata.enabled=false
