# Phase 0 scope: lint + test. Grows into the full DevSecOps pipeline in Phase 4
# (SBOM -> vuln scan -> cosign -> push -> terraform gate -> helm -> smoke).
name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      # spotless:check is bound to verify — lint and tests gate the build together
      - name: Build, lint, test
        run: mvn -B -ntp verify

  compose-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose.yml
        run: docker compose config -q

  # Phase 1 gate: black-box lifecycle tests against the full stack (OceanBase mini needs ~8GB;
  # public-repo ubuntu-latest runners provide 16GB).
  e2e:
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Start stack
        run: docker compose up -d --build
      - name: Wait for health
        run: ./scripts/wait-healthy.sh 7 600
      - name: Run e2e suite
        run: mvn -B -ntp -Pe2e -pl e2e-tests -am test -Dspotless.check.skip=true
      - name: Logs on failure
        if: failure()
        run: docker compose ps; docker compose logs --tail 120
      - name: Tear down
        if: always()
        run: docker compose down -v
